- name: Install and onboard Microsoft Defender for Endpoint (Debian)
  hosts: all
  become: yes

  vars:
    mde_zip_src: "files/mdatp/WindowsDefenderATPOnboardingPackageLinux.zip"
    mde_zip_dest: "/tmp/mde_onboarding.zip"
    mde_extract_path: "/tmp/mde_onboarding"

  tasks:

    # -----------------------------
    # Dependencies
    # -----------------------------
    - name: Ensure required packages are installed
      apt:
        name:
          - unzip
          - python3
        state: present
        update_cache: yes

    # -----------------------------
    # Copy onboarding package from repo
    # -----------------------------
    - name: Copy onboarding package to target
      copy:
        src: "{{ mde_zip_src }}"
        dest: "{{ mde_zip_dest }}"
        mode: '0644'

    # -----------------------------
    # Extract package
    # -----------------------------
    - name: Ensure extract directory exists
      file:
        path: "{{ mde_extract_path }}"
        state: directory

    - name: Extract onboarding package
      unarchive:
        src: "{{ mde_zip_dest }}"
        dest: "{{ mde_extract_path }}"
        remote_src: yes

    # -----------------------------
    # Run onboarding (✅ modern method)
    # -----------------------------
    - name: Run MDE onboarding script
      command: >
        python3 {{ mde_extract_path }}/WindowsDefenderATPOnboardingPackageLinux/MicrosoftDefenderATPOnboardingLinuxServer.py
      args:
        creates: /etc/opt/microsoft/mdatp/mdatp_onboard.json

    # -----------------------------
    # Verify
    # -----------------------------
    - name: Check MDE health
      command: mdatp health
      register: mdatp_health
      changed_when: false

    - name: Show MDE health
      debug:
        var: mdatp_health.stdout

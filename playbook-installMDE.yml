---

- name: Deploy Microsoft Defender for Endpoint
  hosts: all
  become: yes
  vars:
    onboarding_package: "WindowsDefenderATPOnboardingPackage.zip"
    
  tasks:
    - name: Copy onboarding package to target
      copy:
        src: "files/mdatp/WindowsDefenderATPOnboardingPackageLinux.zip"  
        dest: "/tmp/WindowsDefenderATPOnboardingPackageLinux.zip"        
        mode: '0644'

    - name: Ensure unzip is installed
      apt:
        name: unzip
        state: present
        update_cache: yes
        
    - name: Extract onboarding package
      unarchive:
        src: "/tmp/WindowsDefenderATPOnboardingPackageLinux.zip"         
        dest: "/tmp/"
        remote_src: yes
        
    - name: Add Microsoft repository (Ubuntu/Debian)
      block:
        - name: Download Microsoft repository list
          get_url:
            url: "https://packages.microsoft.com/config/ubuntu/{{ ansible_distribution_version }}/prod.list"
            dest: "/tmp/microsoft.list"
            
        - name: Move repository list to sources
          copy:
            src: "/tmp/microsoft.list"
            dest: "/etc/apt/sources.list.d/microsoft-prod.list"
            remote_src: yes
            
        - name: Add Microsoft GPG key
          apt_key:
            url: "https://packages.microsoft.com/keys/microsoft.asc"
            state: present
            
    - name: Update package cache
      apt:
        update_cache: yes
        
    - name: Install MDATP
      apt:
        name: mdatp
        state: present
        
    - name: Onboard device
      command: mdatp onboard /tmp/mdatp_onboard.json
      register: onboard_result
      
    - name: Verify onboarding
      command: mdatp health --field org_id
      register: health_check
      
    - name: Display onboarding status
      debug:
        msg: "Organization ID: {{ health_check.stdout }}"
        
    - name: Clean up temporary files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "/tmp/{{ onboarding_package }}"
        - "/tmp/mdatp_onboard.json"

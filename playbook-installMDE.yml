- name: Install and onboard Microsoft Defender for Endpoint (Ubuntu)
  hosts: all
  become: yes

  vars:
    mde_zip_src: "files/mdatp/WindowsDefenderATPOnboardingPackage.zip"
    mde_extract_path: "/tmp/mde_onboarding"

  tasks:
    # Prerequisites
    - name: Install required packages
      apt:
        name:
          - curl
          - libplist-utils
          - gpg
          - apt-transport-https
          - lsb-release
        state: present
        update_cache: yes

    # AGGRESSIVE CLEANUP - Remove ALL Microsoft repository references
    - name: Find all apt source files
      find:
        paths:
          - /etc/apt/sources.list.d/
        patterns: "*.list"
      register: all_source_files

    - name: Remove Microsoft repository entries from sources.list.d files
      lineinfile:
        path: "{{ item.path }}"
        regexp: '.*packages\.microsoft\.com.*'
        state: absent
      loop: "{{ all_source_files.files }}"
      when: all_source_files.files | length > 0

    - name: Remove Microsoft repository entries from main sources.list
      lineinfile:
        path: /etc/apt/sources.list
        regexp: '.*packages\.microsoft\.com.*'
        state: absent

    - name: Remove any Microsoft-specific list files entirely
      file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ all_source_files.files }}"
      when: 
        - all_source_files.files | length > 0
        - "'microsoft' in item.path | lower"

    - name: Remove all Microsoft GPG keys from all locations
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /usr/share/keyrings/microsoft-prod.gpg
        - /usr/share/keyrings/microsoft.gpg
        - /etc/apt/keyrings/microsoft.gpg
        - /etc/apt/keyrings/microsoft-prod.gpg
        - /etc/apt/trusted.gpg.d/microsoft.gpg
        - /etc/apt/trusted.gpg.d/microsoft-prod.gpg

    - name: Update apt cache after cleanup
      apt:
        update_cache: yes
      ignore_errors: yes

    # Detect OS properly
    - name: Detect OS distribution
      shell: lsb_release -is | tr '[:upper:]' '[:lower:]'
      register: os_distribution
      changed_when: false

    - name: Detect Ubuntu version
      shell: lsb_release -rs
      register: ubuntu_version_raw
      changed_when: false

    - name: Detect Ubuntu codename
      shell: lsb_release -cs
      register: ubuntu_codename
      changed_when: false

    - name: Validate Ubuntu version and set repository URL
      set_fact:
        ubuntu_version: "{{ ubuntu_version_raw.stdout }}"
        is_ubuntu: "{{ os_distribution.stdout == 'ubuntu' }}"

    - name: Fail if not Ubuntu
      fail:
        msg: "This playbook only supports Ubuntu. Detected: {{ os_distribution.stdout }}"
      when: not is_ubuntu

    - name: Fail if unsupported Ubuntu version
      fail:
        msg: "Unsupported Ubuntu version: {{ ubuntu_version }}. Only 20.04, 22.04, and 24.04 are supported."
      when: ubuntu_version not in ['20.04', '22.04', '24.04']

    # Add Microsoft repository cleanly
    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download and install Microsoft GPG key to standard location
      shell: |
        curl -sSL https://packages.microsoft.com/keys/microsoft.asc | \
        gpg --dearmor -o /etc/apt/keyrings/microsoft.gpg
        chmod 644 /etc/apt/keyrings/microsoft.gpg
      args:
        creates: /etc/apt/keyrings/microsoft.gpg

    - name: Create Microsoft repository file manually
      copy:
        dest: /etc/apt/sources.list.d/microsoft-prod.list
        content: |
          deb [arch=amd64,arm64,armhf signed-by=/etc/apt/keyrings/microsoft.gpg] https://packages.microsoft.com/ubuntu/{{ ubuntu_version }}/prod {{ ubuntu_codename.stdout }} main
        mode: '0644'

    - name: Update apt cache with error handling
      apt:
        update_cache: yes
      register: apt_update
      retries: 3
      delay: 5
      until: apt_update is success

    # Install MDATP
    - name: Install Microsoft Defender for Endpoint
      apt:
        name: mdatp
        state: present
      environment:
        DEBIAN_FRONTEND: noninteractive

    # Onboarding
    - name: Create MDE onboarding directory
      file:
        path: "{{ mde_extract_path }}"
        state: directory
        mode: '0755'

    - name: Copy onboarding package to target
      copy:
        src: "{{ mde_zip_src }}"
        dest: "{{ mde_extract_path }}/WindowsDefenderATPOnboardingPackage.zip"
        mode: '0644'

    - name: Unzip the onboarding package
      unarchive:
        src: "{{ mde_extract_path }}/WindowsDefenderATPOnboardingPackage.zip"
        dest: "{{ mde_extract_path }}/"
        remote_src: yes

    - name: Run MDE onboarding script
      command: >
        python3 {{ mde_extract_path }}/MicrosoftDefenderATPOnboardingLinuxServer.py
      args:
        creates: /etc/opt/microsoft/mdatp/mdatp_onboard.json

    # Verification
    - name: Wait for MDATP service to initialize
      pause:
        seconds: 10

    - name: Check MDATP health status
      command: mdatp health --field healthy
      register: mdatp_health
      changed_when: false
      failed_when: false

    - name: Display MDATP health status
      debug:
        msg: "MDATP Health Status: {{ mdatp_health.stdout }}"

    - name: Check MDATP version
      command: mdatp version
      register: mdatp_version
      changed_when: false
      failed_when: false

    - name: Display MDATP version
      debug:
        msg: "MDATP Version: {{ mdatp_version.stdout }}"

    # Cleanup
    - name: Remove temporary onboarding files
      file:
        path: "{{ mde_extract_path }}"
        state: absent

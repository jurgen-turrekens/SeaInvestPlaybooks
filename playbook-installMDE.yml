- name: Install and onboard Microsoft Defender for Endpoint (Debian)
  hosts: all
  become: yes

  vars:
    mde_zip_src: "files/mdatp/WindowsDefenderATPOnboardingPackageLinux.zip"
    mde_zip_dest: "/tmp/mde_onboarding.zip"
    mde_extract_path: "/tmp/mde_onboarding"

  tasks:

    # -----------------------------
    # Add Microsoft repository
    # Required to install mdatp from official MS repo
    # -----------------------------
    - name: Add Microsoft repository GPG key
      apt_key:
        keyserver: keyserver.ubuntu.com
        id: BC528686B50D79E339D3721CEB3E94ADBE1229CF
        state: present
      ignore_errors: yes

    - name: Update package cache after adding GPG key
      apt:
        update_cache: yes
      ignore_errors: yes

    - name: Install Microsoft GPG key via direct download
      shell: |
        wget -q https://packages.microsoft.com/keys/microsoft.asc -O /tmp/microsoft.asc
        apt-key add /tmp/microsoft.asc
      ignore_errors: yes

    - name: Add Microsoft Defender for Endpoint repository
      apt_repository:
        repo: "deb [arch=amd64,arm64,armhf] https://packages.microsoft.com/ubuntu/{{ ansible_distribution_version }}/prod {{ ansible_distribution_release }} main"
        state: present
        filename: microsoft-prod
      ignore_errors: yes

    - name: Update package cache
      apt:
        update_cache: yes

    # -----------------------------
    # install script dependencies and mdatp from Microsoft repo
    # unzip for extraction of MDE installer package, python3 for onboarding script
    # mdatp installed from official Microsoft repository
    # -----------------------------
    - name: Ensure required packages are installed
      apt:
        name:
          - unzip
          - python3
          - mdatp
        state: present
        update_cache: yes

    - name: Copy onboarding package to target 
      copy:
        src: "{{ mde_zip_src }}"
        dest: "{{ mde_zip_dest }}"
        mode: '0644'
      register: copy_result

    - name: Ensure extract directory exists
      file:
        path: "{{ mde_extract_path }}"
        state: directory

    # --------------------------
    # Extract only when needed; based on copy_result CRC change (new package, package not locally present 
    # --------------------------
    - name: Extract onboarding package
      unarchive:
        src: "{{ mde_zip_dest }}"
        dest: "{{ mde_extract_path }}"
        remote_src: yes
      when: copy_result.changed

    # --------------------------
    # Install mdatp from official Microsoft repository
    # --------------------------
    - name: Add Microsoft GPG key
      apt_key:
        url: https://packages.microsoft.com/keys/microsoft.asc
        state: present

    - name: Add Microsoft Defender for Endpoint repository
      apt_repository:
        repo: "deb [arch=amd64,arm64,armhf signed-by=/usr/share/keyrings/microsoft-archive-keyring.gpg] https://packages.microsoft.com/ubuntu {{ ansible_distribution_release }} main"
        state: present
        filename: microsoft-mde

    - name: Update apt cache after adding Microsoft repo
      apt:
        update_cache: yes

    - name: Install mdatp package
      apt:
        name: mdatp
        state: present

    - name: Run MDE onboarding script
      command: >
        python3 {{ mde_extract_path }}/MicrosoftDefenderATPOnboardingLinuxServer.py
      args:
        creates: /etc/opt/microsoft/mdatp/mdatp_onboard.json
    
    - name: Enable realtime protection
      command: mdatp config real-time-protection --value enabled
      register: realtime_result
      changed_when: "'enabled' in realtime_result.stdout.lower()"
      failed_when: false
   
    - name: Ensure daily MDE definition update at midnight
      cron:
        name: "MDE definition update"
        job: "/usr/bin/mdatp definitions update"
        minute: "0"
        hour: "0"
        user: root
   
    - name: Get MDE health
      command: mdatp health --output json
      register: mdatp_health
      changed_when: false

    - name: Show only useful MDE health values in playbook debug output
      vars:
        health: "{{ mdatp_health.stdout | from_json }}"
      debug:
        msg: |
          MDE Status:
          - Healthy: {{ health.healthy }}
          - Real-time protection: {{ health.realTimeProtectionEnabled.value }}
          - Definitions status: {{ health.definitionsStatus['$type'] }}
        
        
